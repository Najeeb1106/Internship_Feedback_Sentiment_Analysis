{% extends "base.html" %}

{% block title %}Sign Up - Sentintern AI{% endblock %}

{% block content %}
<div class="container" style="padding-top: 6rem; display: flex; justify-content: center;">
    <div class="glass-card fade-in" style="width: 100%; max-width: 450px;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="width: 60px; height: 60px; background: rgba(34, 211, 238, 0.1); border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid var(--secondary);">
                <i data-lucide="user-plus" style="color: var(--secondary);"></i>
            </div>
            <h1 style="font-size: 2rem;">Create Account</h1>
            <p style="color: var(--text-dim); margin-top: 0.5rem;">Start analyzing intern feedback today</p>
        </div>

        <form action="/signup" method="post">
            <div class="form-group">
                <label for="username">Choose Username</label>
                <div style="position: relative;">
                    <i data-lucide="user" style="position: absolute; left: 1rem; top: 1rem; width: 18px; color: var(--text-dim);"></i>
                    <input type="text" id="username" name="username" placeholder="e.g. coordinator_jane" required style="padding-left: 3rem;">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Create Password</label>
                <div style="position: relative;">
                    <i data-lucide="key" style="position: absolute; left: 1rem; top: 1rem; width: 18px; color: var(--text-dim);"></i>
                    <input type="password" id="password" name="password" placeholder="Min 8 characters" required style="padding-left: 3rem;">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem; font-size: 1rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none;">
                Get Started Now
            </button>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-dim); font-size: 0.9rem;">
            Already have an account? <a href="/login" style="color: var(--secondary); text-decoration: none; font-weight: 600;">Sign in here</a>
        </p>
    </div>
</div>
{% endblock %}
