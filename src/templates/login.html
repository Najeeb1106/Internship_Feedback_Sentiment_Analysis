{% extends "base.html" %}

{% block title %}Login - Sentintern AI{% endblock %}

{% block content %}
<div class="container" style="padding-top: 6rem; display: flex; justify-content: center;">
    <div class="glass-card fade-in" style="width: 100%; max-width: 450px;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="width: 60px; height: 60px; background: rgba(99, 102, 241, 0.1); border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid var(--primary);">
                <i data-lucide="lock" style="color: var(--primary);"></i>
            </div>
            <h1 style="font-size: 2rem;">Welcome Back</h1>
            <p style="color: var(--text-dim); margin-top: 0.5rem;">Access your sentiment analytics portal</p>
        </div>

        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <div style="position: relative;">
                    <i data-lucide="user" style="position: absolute; left: 1rem; top: 1rem; width: 18px; color: var(--text-dim);"></i>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required style="padding-left: 3rem;">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <i data-lucide="key" style="position: absolute; left: 1rem; top: 1rem; width: 18px; color: var(--text-dim);"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" required style="padding-left: 3rem;">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem; font-size: 1rem;">
                Login to Dashboard
            </button>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-dim); font-size: 0.9rem;">
            Don't have an account? <a href="/signup" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign up free</a>
        </p>
    </div>
</div>
{% endblock %}
