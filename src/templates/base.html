<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sentintern AI{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <a href="/" class="brand" style="text-decoration: none;">
            <i data-lucide="brain-circuit"></i> Sentintern AI
        </a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/how-it-works">How It Works</a></li>
        </ul>
        <div class="nav-auth">
            {% if request.cookies.get('access_token') %}
                <a href="/dashboard" class="btn btn-outline">Dashboard</a>
                <a href="/logout" class="btn btn-primary" style="background: var(--accent); border-color: var(--accent);">Logout</a>
            {% else %}
                <a href="/login" class="btn btn-outline">Login</a>
                <a href="/signup" class="btn btn-primary">Join Now</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Sentintern AI. Powering the future of feedback analysis.</p>
    </footer>

    <script>
        lucide.createIcons();
        
        // Active link highlighting
        const currentPath = window.location.pathname;
        document.querySelectorAll('.nav-links a').forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
